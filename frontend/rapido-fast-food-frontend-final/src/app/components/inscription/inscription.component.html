<div class="auth-wrapper">
  <div class="auth-banner">
    <div class="overlay"></div>
    <div class="banner-content">
      <h1 class="brand-logo">Eatsy</h1>
    </div>
  </div>

  <div class="auth-form-container">
    <div class="auth-header">
      <div class="auth-nav">
        <a routerLink="/connection" class="nav-link">Se connecter</a>
        <a routerLink="/inscription" class="nav-link active">S'inscrire</a>
      </div>
      <h2 class="welcome-title">Bienvenue !</h2>
      <p class="subtitle">Chez <span class="brand-text">Rapido Food</span></p>
    </div>

    <form class="register-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Nom et Prénom</label>
        <input type="text" formControlName="fullName" placeholder="Entrez votre nom complet">
        <div *ngIf="registerForm.get('fullName')?.invalid && (registerForm.get('fullName')?.dirty || registerForm.get('fullName')?.touched)" class="text-danger mt-1 small">
          Le nom est requis (min. 3 caractères).
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="exemple@mail.com">
        <div *ngIf="registerForm.get('email')?.invalid && (registerForm.get('email')?.dirty || registerForm.get('email')?.touched)" class="text-danger mt-1 small">
          Veuillez entrer un email valide.
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="password-wrapper" style="position: relative;">
          <input [type]="showPassword ? 'text' : 'password'" 
                 formControlName="password" 
                 placeholder="••••••••"
                 style="width: 100%;">
          <i class="fa" 
             [ngClass]="showPassword ? 'fa-eye' : 'fa-eye-slash'"
             (click)="togglePassword()"
             style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6c757d;">
          </i>
        </div>
        <div *ngIf="registerForm.get('password')?.invalid && (registerForm.get('password')?.dirty || registerForm.get('password')?.touched)" class="text-danger mt-1 small">
          <div *ngIf="registerForm.get('password')?.errors?.['required']">Le mot de passe est requis.</div>
          <div *ngIf="registerForm.get('password')?.errors?.['minlength']">Il faut au moins 8 caractères.</div>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="password-wrapper" style="position: relative;">
          <input [type]="showConfirmPassword ? 'text' : 'password'" 
                 formControlName="confirmPassword" 
                 placeholder="••••••••"
                 style="width: 100%;">
          <i class="fa" 
             [ngClass]="showConfirmPassword ? 'fa-eye' : 'fa-eye-slash'"
             (click)="toggleConfirmPassword()"
             style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6c757d;">
          </i>
        </div>
        <div *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')" class="text-danger mt-1 small">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger mt-3 small">
        <i class="fa fa-exclamation-triangle"></i> {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit">S'inscrire</button>
    </form>
  </div>
</div>
